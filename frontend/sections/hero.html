<!-- ========================================
     HERO SECTION
     Premium Hero with Auto-Rotating Image Slideshow
======================================== -->
<section id="home" class="hero-section">

    <!-- ===== BACKGROUND IMAGE SLIDESHOW ===== -->
    <div class="hero-slider" id="heroSlider">
        <div class="hero-slide active" style="background-image: url('assets/images/hero-slide-1.jpg')"></div>
        <div class="hero-slide" style="background-image: url('assets/images/hero-slide-2.jpg')"></div>
        <div class="hero-slide" style="background-image: url('assets/images/hero-slide-3.jpg')"></div>
    </div>

    <!-- Dark overlay for text readability -->
    <div class="hero-overlay"></div>

    <!-- Slide indicators (dots) -->
    <div class="hero-indicators" id="heroIndicators">
        <button class="hero-dot active" data-slide="0" aria-label="Slide 1"></button>
        <button class="hero-dot" data-slide="1" aria-label="Slide 2"></button>
        <button class="hero-dot" data-slide="2" aria-label="Slide 3"></button>
    </div>

    <!-- ===== HERO CONTENT ===== -->
    <div class="container hero-content-wrapper">
        <div class="row align-items-center">
            <div class="col-lg-9" data-aos="fade-right" data-aos-duration="1000">

                <!-- Badge -->
                <div class="hero-badge mb-3" data-aos="zoom-in" data-aos-delay="200">
                    <i class="fas fa-award me-2"></i>#1 AC Service Provider in Mumbai
                </div>

                <!-- Main Headline -->
                <h1 class="hero-title" data-aos="fade-up" data-aos-delay="400">
                    Professional AC Service &amp; Installation at Your Doorstep
                </h1>

                <!-- Subheadline -->
                <p class="hero-subtitle" data-aos="fade-up" data-aos-delay="600">
                    <i class="fas fa-check-circle text-cyan me-2"></i>
                    Certified Technicians &nbsp;|&nbsp; 
                    <i class="fas fa-clock text-cyan me-2"></i>
                    Same Day Service &nbsp;|&nbsp; 
                    <i class="fas fa-users text-cyan me-2"></i>
                    Trusted by 1000+ Customers
                </p>

                <!-- CTA Buttons -->
                <div class="hero-cta" data-aos="fade-up" data-aos-delay="800">
                    <a href="#contact" class="btn btn-primary-glow btn-lg">
                        <i class="fas fa-calendar-check me-2"></i>Book Service
                    </a>
                    <a href="tel:+919819104977" class="btn btn-outline-glow btn-lg">
                        <i class="fas fa-phone me-2"></i>Call Now

                </div>

                <!-- Trust Indicators -->
                <div class="trust-indicators mt-4" data-aos="fade-up" data-aos-delay="1000">
                    <div class="trust-item">
                        <i class="fas fa-check-circle text-success"></i>
                        <span>5000+ Happy Customers</span>
                    </div>
                    <div class="trust-item">
                        <i class="fas fa-clock text-warning"></i>
                        <span>Same Day Service</span>
                    </div>
                    <div class="trust-item">
                        <i class="fas fa-shield-alt text-info"></i>

            </div>

    <!-- Prev / Next Arrows -->
    <button class="hero-arrow hero-arrow-prev" id="heroPrev" aria-label="Previous slide">
        <i class="fas fa-chevron-left"></i>
    </button>
    <button class="hero-arrow hero-arrow-next" id="heroNext" aria-label="Next slide">
        <i class="fas fa-chevron-right"></i>
    </button>

</section>

<!-- ===== HERO SLIDER SCRIPT ===== -->
<script>
(function() {
    'use strict';

    const SLIDE_DURATION = 4000; // 4 seconds per slide
    const TRANSITION_DURATION = 1200; // 1.2s crossfade

    let currentSlide = 0;
    let slideTimer = null;
    let isTransitioning = false;

    const slider = document.getElementById('heroSlider');
    const slides = slider ? slider.querySelectorAll('.hero-slide') : [];
    const dots = document.querySelectorAll('.hero-dot');
    const prevBtn = document.getElementById('heroPrev');
    const nextBtn = document.getElementById('heroNext');

    if (!slides.length) return;

    function goToSlide(index) {
        if (isTransitioning || index === currentSlide) return;
        isTransitioning = true;

        // Remove active from current
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');

        // Set new slide
        currentSlide = (index + slides.length) % slides.length;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');

        setTimeout(() => { isTransitioning = false; }, TRANSITION_DURATION);
    }

    function nextSlide() {
        goToSlide(currentSlide + 1);
    }

    function prevSlide() {
        goToSlide(currentSlide - 1);
    }

    function startAutoPlay() {
        stopAutoPlay();
        slideTimer = setInterval(nextSlide, SLIDE_DURATION);
    }

    function stopAutoPlay() {
        if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }
    }

    // Dot click
    dots.forEach((dot, i) => {
        dot.addEventListener('click', () => { goToSlide(i); startAutoPlay(); });
    });

    // Arrow clicks
    if (prevBtn) prevBtn.addEventListener('click', () => { prevSlide(); startAutoPlay(); });
    if (nextBtn) nextBtn.addEventListener('click', () => { nextSlide(); startAutoPlay(); });

    // Pause on hover (good UX!)
    const heroSection = document.getElementById('home');
    if (heroSection) {
        heroSection.addEventListener('mouseenter', stopAutoPlay);
        heroSection.addEventListener('mouseleave', startAutoPlay);
    }

    // Touch / Swipe support for mobile
    let touchStartX = 0;
    if (slider) {
        slider.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
        slider.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? nextSlide() : prevSlide();
                startAutoPlay();
            }
        }, { passive: true });
    }

    // Start!
    startAutoPlay();
})();
</script>
